[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lk-mcp"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "localknowledge-core",
    "mcp>=1.26",
]

[project.scripts]
lk-mcp = "lk_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/lk_mcp"]

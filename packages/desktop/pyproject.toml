[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lk-desktop"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "localknowledge-core",
    "rumps>=0.4.0",
    "click>=8.1",
]

[project.scripts]
lk-desktop = "lk_desktop.app:main"

[tool.hatch.build.targets.wheel]
packages = ["src/lk_desktop"]

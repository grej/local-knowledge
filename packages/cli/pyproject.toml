[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lk-cli"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "localknowledge-core",
    "click>=8.1",
    "rich>=13.0",
]

[project.scripts]
lk = "lk.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/lk"]

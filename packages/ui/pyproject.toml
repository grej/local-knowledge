[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lk-ui"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "localknowledge-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
]

[project.scripts]
lk-ui = "lk_ui.app:main"

[tool.hatch.build.targets.wheel]
packages = ["src/lk_ui"]
